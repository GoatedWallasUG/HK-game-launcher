<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hollow Knight Launcher</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a1a1a, #000);
    font-family: Arial, sans-serif;
    color: white;
}

.container {
    text-align: center;
}

h1 {
    font-size: 42px;
    margin-bottom: 30px;
}

.play-btn {
    background: purple;
    color: white;
    padding: 18px 40px;
    font-size: 24px;
    border-radius: 10px;
    border: 2px solid black;
    text-decoration: none;
    display: inline-block;
    transition: 0.2s;
}

.play-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(128, 0, 128, 0.8);
}
</style>
</head>
<body>

<div class="container">
    <h1>Hollow Knight</h1>

    <a class="play-btn"
       href="https://cdn.jsdelivr.net/gh/web-ports/hollow-knight@latest/index.html"
       target="_blank">
       ▶ Play Fullscreen
    </a>
</div>

</body>
</html>
